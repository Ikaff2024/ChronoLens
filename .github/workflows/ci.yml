name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chronolens
          POSTGRES_USER: chronolens
          POSTGRES_PASSWORD: chronolens
        ports:
          - 5440:5432
        options: >-
          --health-cmd "pg_isready -U chronolens"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://chronolens:chronolens@localhost:5440/chronolens
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:migrate:deploy
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: docker build --file apps/api/Dockerfile --tag chronolens-api-ci .
      - run: docker build --file apps/web/Dockerfile --build-arg NEXT_PUBLIC_API_URL=http://localhost:3021 --tag chronolens-web-ci .
      - run: npm run start --workspace @chronolens/api > /tmp/chronolens-api.log 2>&1 &
      - name: Wait for API
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://localhost:3021/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/chronolens-api.log
          exit 1
      - name: Smoke HTTP
        run: npm run smoke:http || { cat /tmp/chronolens-api.log; exit 1; }
